name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend: Python tests
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing
        env:
          # Use dummy values for tests — the test suite mocks all external calls
          ANTHROPIC_API_KEY: sk-ant-test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          ENVIRONMENT: development
          CORS_ORIGINS: http://localhost:5173

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: backend/coverage.xml
          flags: backend

  # ---------------------------------------------------------------------------
  # Frontend: TypeScript type-check + lint
  # ---------------------------------------------------------------------------
  frontend-typecheck:
    name: Frontend type-check + lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Frontend: Build check (catches import errors, missing types, etc.)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://dbt-contracts-production.up.railway.app

  # ---------------------------------------------------------------------------
  # GitHub Action: validate the action itself works
  # ---------------------------------------------------------------------------
  action-self-test:
    name: GitHub Action self-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run action against sample data
        uses: ./github-action
        with:
          contracts-path: sample_data/test_contracts.yml
          manifest-path: sample_data/sample_manifest.json
          fail-on-violation: 'false'
